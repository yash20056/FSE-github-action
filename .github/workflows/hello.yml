name: My First Workflow

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "hello, Github Actions" 
  
  say-bye:
    needs: say-hello
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "BYE, Github Actions"

        