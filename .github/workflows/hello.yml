name: Real CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node with cache
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint Check
        run: npm run lint


  test-check:
    runs-on: ubuntu-latest
    needs: lint-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node with cache
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Test
        run: npm test


  build-check:
    runs-on: ubuntu-latest
    needs: test-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node with cache
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Code
        run: npm run build